<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Previous Me</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="panel">
        <p class="label">Persona</p>
        <h1>Previous Me</h1>
        <div id="sources"></div>
      </aside>
      <section class="chat">
        <div id="conversation" class="conversation"><article class="assistant">Ask a question as if talking with a version of yourself reconstructed from old notes.</article></div>
        <form id="composer" class="composer"><textarea id="message" rows="3" placeholder="What did I used to think about planning?"></textarea><button>Send</button></form>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
